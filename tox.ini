[tox]
envlist = py{311,312,313,314},
          notebooks,
          dashboard,
          deepqlearning,
          slm,
          lint,
          type

[gh-actions]
python =
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[testenv]
# Build and install a real sdist/wheel per env (no editable-install hack) so the
# packaged distribution is what actually gets tested.
deps =
    -r requirements.txt
    -r requirements-dev.txt
basepython =
    py311: python3.11
    py312: python3.12
    py313: python3.13
    py314: python3.14
commands = pytest src/life_model/tests/ -m "not notebooks" --cov

[testenv:notebooks]
basepython = python3.12
deps = {[testenv]deps}
commands = pytest src/life_model/tests/ -m notebooks

[testenv:dashboard]
basepython = python3.12
deps =
    {[testenv]deps}
    -r dashboard/requirements-dash.txt
commands = pytest dashboard/tests/

[testenv:deepqlearning]
basepython = python3.12
deps =
    {[testenv]deps}
    -r deepqlearning/requirements-rl.txt
commands = pytest deepqlearning/tests/ -m "not slow"

[testenv:deepqlearning-slow]
# Multi-episode RL training smoke test (Plan 19 D6). Slow; run in a dedicated job, not the
# default deepqlearning env.
basepython = python3.12
deps =
    {[testenv]deps}
    -r deepqlearning/requirements-rl.txt
commands = pytest deepqlearning/tests/ -m slow

[testenv:slm]
# Language-model adviser tests (Plan 20). The schema/serializer/scoring/eval/tool-loop tests run
# against the deterministic stub AdviserModel and need only the core simulator + gymnasium +
# pydantic — never model weights. The training stack (transformers/peft/trl) is NOT installed
# here, so the smoke SFT (marked slow) skips gracefully.
basepython = python3.12
deps =
    {[testenv]deps}
    -r deepqlearning/requirements-rl.txt
    pyyaml>=6.0
commands = pytest slm/tests/ -m "not slow"

[testenv:lint]
basepython = python3.12
skip_install = true
deps = ruff
commands =
    ruff check src/life_model dashboard deepqlearning
    ruff format --check src/life_model dashboard deepqlearning

[testenv:type]
basepython = python3.12
deps =
    mypy
    -r requirements.txt
commands = mypy src/life_model

[testenv:docs]
basepython = python3.12
extras = docs
commands = sphinx-build -W -b html docs docs/_build/html
