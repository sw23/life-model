name: Build distribution

# Reusable workflow: validate the release tag, build the sdist+wheel, verify
# metadata, smoke-install the wheel, and publish the artifact for downstream jobs.
on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used to build the distribution.
        required: false
        default: '3.12'
        type: string

jobs:
  build:
    name: Build & validate distribution
    runs-on: ubuntu-latest
    steps:
    - name: Fail if not run from a version tag
      run: |
        if [[ "${{ github.ref }}" != refs/tags/* ]]; then
          echo "::error::This workflow must be dispatched from a version tag (refs/tags/vX.Y.Z), got '${{ github.ref }}'."
          exit 1
        fi
        if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Invalid tag name format '${{ github.ref_name }}'. Expected 'vX.Y.Z'."
          exit 1
        fi
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0 # full history so setuptools-scm can derive the version from the tag
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install build tooling
      run: python -m pip install --upgrade pip build twine check-wheel-contents
    - name: Build a binary wheel and a source tarball
      run: python -m build
    - name: Validate metadata and wheel contents
      run: |
        twine check dist/*
        check-wheel-contents dist/*.whl
    - name: Smoke-install the wheel and run a simulation
      run: |
        python -m venv /tmp/smoke
        /tmp/smoke/bin/pip install dist/*.whl
        cd /tmp
        /tmp/smoke/bin/python -c "import life_model; print('imported', life_model.__version__)"
        # New subpackages must ship in the wheel (Plan 15: healthcare/Medicare/LTC).
        /tmp/smoke/bin/python -c "import life_model.healthcare; from life_model.healthcare import MedicalCosts, Medicare, LongTermCare; print('healthcare ok')"
        /tmp/smoke/bin/python -m life_model --years 5
    - name: Store the distribution packages
      uses: actions/upload-artifact@v7
      with:
        name: python-package-distributions
        path: dist/
