name: Python Tox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit:
    name: Unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.python-version == '3.14' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0 # full history so setuptools-scm can derive the version
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install tox
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox tox-gh-actions
    - name: Run unit tests
      run: tox
    - name: Upload coverage
      if: matrix.python-version == '3.12'
      uses: actions/upload-artifact@v7
      with:
        name: coverage
        path: .coverage
        include-hidden-files: true

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - run: python -m pip install tox
    - run: tox -e lint

  type:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    # Lenient during Phase 0/1; does not block merges until later plans tighten types.
    continue-on-error: true
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - run: python -m pip install tox
    - run: tox -e type

  notebooks:
    name: Notebook tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - run: python -m pip install tox
    - run: tox -e notebooks

  dashboard:
    name: Dashboard tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - run: python -m pip install tox
    - run: tox -e dashboard

  deepqlearning:
    name: RL tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - run: python -m pip install tox
    - run: tox -e deepqlearning

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - uses: pre-commit/action@v3.0.1

  build-and-smoke:
    name: Build & smoke-test wheel
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0 # full history so setuptools-scm can derive the version
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Build distribution
      run: |
        python -m pip install --upgrade pip build twine check-wheel-contents
        python -m build
    - name: Validate metadata and wheel contents
      run: |
        twine check dist/*
        check-wheel-contents dist/*.whl
    - name: Install wheel into a clean environment and run a simulation
      run: |
        python -m venv /tmp/smoke
        /tmp/smoke/bin/pip install dist/*.whl
        # Run from a temp CWD to prove packaged data/config resolves without the repo.
        cd /tmp
        /tmp/smoke/bin/python -c "import life_model; print('imported', life_model.__version__)"
        /tmp/smoke/bin/python -m life_model --years 5
