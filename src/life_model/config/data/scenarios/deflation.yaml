# Deflationary scenario - sustained low/negative inflation with depressed returns.
economy:
  mode: fixed
  inflation: -0.5        # falling prices
  wage_growth: 0.5
  equity_return: 2.0     # low growth expectations
  bond_return: 1.0
  cash_yield: 0.0        # near-zero rates
  home_appreciation: 0.0
debt:
  credit_card:
    default_interest_rate: 12.0  # lower nominal rates
