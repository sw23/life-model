# Economic boom scenario - a multi-year run of elevated equity returns and cash yields.
# PATH mode overrides individual calendar years; unlisted years fall back to the fixed
# economy constants. The window below is illustrative (near-term).
economy:
  mode: path
  paths:
    equity_return:
      2027: 14.0
      2028: 16.0
      2029: 12.0
    cash_yield:
      2027: 3.0
      2028: 3.0
      2029: 3.0
