# Default financial configuration values for life-model
#
# The top-level `tax` section holds the current-year (2026) snapshot used by the
# single-year tax path. The year-indexed `tax_years` table near the bottom of this
# file holds published values for 2022-2026 for the year-aware tax API
# (config.tax_year(year)); see docs/configuration.md for the projection rule.

