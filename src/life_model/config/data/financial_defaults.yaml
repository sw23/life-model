accounts:
  bank:
    default_interest_rate: 0.0
    compound_rate: 12  # monthly compounding
  brokerage:
    default_growth_rate: 7.0  # percentage
  hsa:
    # vintage: 2026, source: IRS Rev. Proc. 2025-19
    contribution_limit: 4400  # self-only
    contribution_limit_family: 8750
    default_employer_contribution: 0
  plan_529:
    annual_contribution_limit: 19000  # per beneficiary (2025/2026 gift tax exclusion)
    lifetime_contribution_limit: 500000  # typical state limit
    default_growth_rate: 7.0  # percentage
    qualified_expense_penalty: 10.0  # percentage penalty on earnings for non-qualified withdrawals

insurance:
  life:
    default_loan_interest_rate: 6.0  # percentage
    default_cash_value_growth_rate: 0.0
    default_max_missed_payments: 3
    surrender_percentages:
      early: 0.5  # less than 3 years
      standard: 0.8  # 3+ years
    cash_value_premium_fraction_first_year: 0.3  # fraction of premium to cash value in year 1
    cash_value_premium_fraction_later: 0.6  # fraction of premium to cash value after year 1
    loan_to_value_ratio: 0.9  # max fraction of available cash value borrowable
  annuity:
    default_interest_rate: 3.0  # percentage
    default_payout_start_age: 65
    default_surrender_charge_years: 7
    default_surrender_charge_rate: 7.0  # percentage
    default_period_certain_years: 10
    max_projection_age: 120  # actuarial horizon for annuity-factor integration
    survival_probability_cutoff: 0.001  # stop integrating once survival falls below this
  general:
    default_premium_increase_rate: 3.0  # percentage
    default_max_claims_per_year: 3

debt:
  credit_card:
    default_interest_rate: 18.0  # percentage
    default_minimum_payment_percent: 2.0  # percentage
    default_minimum_payment_floor: 25.0  # dollars, typical card minimum-payment floor
  student_loan:
    # vintage: 2025, source: IRC §221 above-the-line interest deduction (MAGI phase-out ignored)
    interest_deduction_limit: 2500  # dollars per year

housing:
  # PMI charged yearly while loan-to-value exceeds the threshold, then auto-dropped.
  pmi_rate: 0.5  # percent of loan balance per year
  pmi_ltv_threshold: 80.0  # percent LTV
  closing_cost_percent: 2.0  # percent of purchase price paid at purchase
  selling_cost_percent: 6.0  # percent of sale price paid at sale (agent commission, etc.)
  # vintage: statutory, source: IRC §121 primary-residence capital-gains exclusion (unindexed)
  section_121_exclusion:
    single: 250000
    married_filing_jointly: 500000

# Children and dependents: age-banded cost of raising a child and the child-related
# tax credits. Costs are nominal (start-year dollars) and grown by cumulative inflation
# in Child.pre_step so a child born later costs later-year dollars.
dependents:
  # Age-banded annual cost of a child. Representative national estimates.
  # vintage: 2024, source: Child Care Aware of America (childcare ~0-5); USDA/Brookings
  #   child-rearing cost estimates (school age 6-17); College Board Trends in College
  #   Pricing (college) -- placeholders, TODO(verify) against a primary cost survey.
  childcare_annual_cost: 12000    # ages 0 through college_start_age-13 (roughly 0-5)
  school_age_annual_cost: 8000    # school-age band (roughly 6-17)
  college_annual_cost: 28000      # per college year; drawn from a 529 first when available
  college_start_age: 18
  college_years: 4
  adult_age: 18                   # costs stop at this age (except the college band)
  # Child Tax Credit (IRC §24 as amended by the One Big Beautiful Bill Act).
  # vintage: 2026, source: IRC §24(h)(2)/(5) (OBBBA), Rev. Proc. 2025-32.
  ctc_per_child: 2200
  ctc_refundable_max: 1700
  ctc_qualifying_age_max: 17
  # Phase-out thresholds are statutory and not inflation-indexed.
  # vintage: statutory, source: IRC §24(h)(3).
  ctc_phaseout_start:
    single: 200000
    married_filing_jointly: 400000
    head_of_household: 200000
  ctc_phaseout_rate: 5.0          # percent of modified AGI over threshold ($50 per $1,000)
# Estate settlement. inherited_pretax_mode controls how a non-spouse beneficiary receives an
# inherited pre-tax retirement balance: "ten_year" applies the SECURE Act 10-year rule (the
# balance keeps growing and pays out an even slice each year over ten years), while "lump_sum"
# distributes and taxes the whole balance in the death year (the lump-sum simplification).
# vintage: 2020, source: SECURE Act §401 (10-year rule for non-eligible designated beneficiaries)
estate:
  inherited_pretax_mode: ten_year  # ten_year | lump_sum

# Economy-wide rates driving account returns, wage growth, and inflation. A single
# EconomyModel per simulation reads this section and answers per-year rate queries.
# The defaults reproduce the pre-economy per-account constants, so `mode: fixed` leaves
# simulation output unchanged. See docs/configuration.md for path/stochastic modes.
economy:
  mode: fixed  # fixed | path | stochastic
  inflation: 3.0          # percent CPI (drives spending/rent increases when opted in)
  wage_growth: 3.0        # percent nominal wage growth (salary increases when opted in)
  equity_return: 7.0      # percent (brokerage / IRA / 529 default return)
  bond_return: 3.0        # percent
  cash_yield: 0.0         # percent (bank account default interest)
  home_appreciation: 4.0  # percent home value appreciation
  paths: {}               # PATH mode: {rate_name: {year: percent, ...}, ...}
  stochastic:             # STOCHASTIC mode distribution parameters (percent)
    equity_mean: 7.0
    equity_vol: 15.0
    bond_mean: 3.0
    bond_vol: 5.0
    inflation_mean: 3.0
    inflation_vol: 1.5
    cash_yield_mean: 0.0
    cash_yield_vol: 0.5
    home_appreciation_mean: 4.0
    home_appreciation_vol: 6.0
    wage_growth_mean: 3.0
    wage_growth_vol: 1.0
    equity_bond_correlation: 0.1
    equity_inflation_correlation: -0.1
    bond_inflation_correlation: -0.2

# Healthcare, Medicare & long-term care. Opt-in agents (MedicalCosts, Medicare,
# LongTermCare) read this section; a simulation with none constructed is unaffected. Dollar
# values are vintage-stamped from CMS/SSA/Genworth/NFDA primary sources. Refresh annually via
# the refresh-financial-data skill (Medicare Part B/D premiums, IRMAA tiers, LTC costs, funeral).
healthcare:
  # Age-banded out-of-pocket medical-cost curve (real start-year dollars, per person per year).
  # max_age is the inclusive upper bound of the band. Scaled each year by cumulative inflation
  # plus medical_inflation_premium. vintage: 2024, source: CMS NHE / MEPS OOP by age -- TODO(verify)
  medical_cost_bands:
    - {max_age: 39,  annual_cost: 1500}
    - {max_age: 64,  annual_cost: 3000}
    - {max_age: 74,  annual_cost: 6000}
    - {max_age: 84,  annual_cost: 9000}
    - {max_age: 200, annual_cost: 12000}
  # Percentage points medical inflation runs above CPI.
  # vintage: 2024, source: CMS National Health Expenditure projections -- TODO(verify)
  medical_inflation_premium: 2.0
  medicare:
    eligibility_age: 65
    # Part A is premium-free with sufficient work history (documented simplification).
    # Premiums are MONTHLY (annualized x12 by the Medicare agent).
    part_b_base_monthly_premium: 202.90  # vintage: 2026, source: CMS 2026 Part B fact sheet
    part_d_base_monthly_premium: 34.50   # vintage: 2026, source: CMS Part D national base premium
    # IRMAA tiers: applied when two-year-lookback MAGI EXCEEDS the filing-status lower bound.
    # vintage: 2026, source: CMS 2026 Parts B fact sheet (Part B monthly); SSA Part D IRMAA.
    irmaa_tiers:
